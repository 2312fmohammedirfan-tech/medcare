<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | MedCare</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-medium);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .tab.active {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--primary-blue);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            outline: none;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 42px;
            cursor: pointer;
            color: var(--text-muted);
        }
    </style>
</head>

<body style="background-color: #f0f2f5;">
    <div class="container">
        <div style="text-align: center; margin-top: 50px;">
            <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <i class="fas fa-heartbeat"></i> MedCare
            </a>
        </div>

        <div class="auth-container">
            <div class="tabs">
                <div class="tab active" id="loginTab">Login</div>
                <div class="tab" id="registerTab">Register</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Password</label>
                    <input type="password" class="password-input" placeholder="Enter your password" required>
                    <i class="fas fa-eye password-toggle"></i>
                </div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="color: var(--primary-blue); font-size: 0.9rem;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Login</button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Full Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Password</label>
                    <input type="password" class="password-input" placeholder="Create a password" required>
                    <i class="fas fa-eye password-toggle"></i>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Create
                    Account</button>
            </form>

            <div style="margin-top: 30px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                By continuing, you agree to MedCare's <a href="#" style="color: var(--primary-blue);">Terms &
                    Conditions</a>.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const passwordToggles = document.querySelectorAll('.password-toggle');

            // Tab Switching
            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            });

            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            });

            // Password Show/Hide
            passwordToggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const input = toggle.previousElementSibling;
                    if (input.type === 'password') {
                        input.type = 'text';
                        toggle.classList.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        input.type = 'password';
                        toggle.classList.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            });

            // Dummy Submission
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Login Successful! Redirecting to home...');
                window.location.href = 'index.html';
            });

            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Registration Successful! Please login to continue.');
                loginTab.click();
            });
        });
    </script>
</body>

</html>
